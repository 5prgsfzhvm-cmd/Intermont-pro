<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intermont</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#020617;
}

.logo {
  font-size:22px;
  font-weight:bold;
}

.menu-btn {
  font-size:26px;
  cursor:pointer;
}

/* MENU */
.menu {
  display:none;
  position:absolute;
  top:60px;
  right:10px;
  background:#020617;
  border-radius:10px;
  padding:10px;
}

.menu a {
  display:block;
  color:white;
  padding:10px;
  text-decoration:none;
}

/* HERO */
.hero {
  text-align:center;
  padding:30px 20px;
}

.hero h1 {
  font-size:32px;
}

/* SECTION */
section {
  padding:25px;
}

/* CARDS */
.usluge {
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
}

.card {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
}

.modal img {
  width:100%;
}

.close {
  position:absolute;
  top:10px;
  right:15px;
  font-size:30px;
  cursor:pointer;
}

/* FOOTER */
footer {
  text-align:center;
  padding:15px;
  background:#020617;
}
</style>

</head>

<body>

<header>
  <div class="logo">⚡ INTERMONT</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <a href="#">Početna</a>
  <a href="#usluge">Usluge</a>
  <a href="#kontakt">Kontakt</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Intermont</h1>
  <p>Profesionalne elektro usluge</p>
  <p><b>Direktor:</b> Nikola Stošić</p>
  <p><b>Iskustvo:</b> 5 godina</p>
</div>

<!-- USLUGE -->
<section id="usluge">
  <h2>Naši radovi</h2>

  <div class="usluge">

    <div class="card" onclick="openModal('IMG_1038.jpeg')">
      <img src="IMG_1038.jpeg">
      <h3>Kućne instalacije</h3>
    </div>

    <div class="card" onclick="openModal('IMG_1088.jpeg')">
      <img src="IMG_1088.jpeg">
      <h3>Industrijske instalacije</h3>
    </div>

    <div class="card" onclick="openModal('IMG_1121.jpeg')">
      <img src="IMG_1121.jpeg">
      <h3>LED rasvjeta</h3>
    </div>

    <div class="card" onclick="openModal('IMG_1123.jpeg')">
      <img src="IMG_1123.jpeg">
      <h3>Ventilacija i sistemi</h3>
    </div>

  </div>
</section>

<!-- KONTAKT -->
<section id="kontakt">
  <h2>Kontakt</h2>
  <p>📞 +386 64 139 333</p>
  <p>📍 Ptuj</p>
</section>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <span class="close">×</span>
  <img id="modalImg">
</div>

<footer>
© 2026 Intermont
</footer>

<script>
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function openModal(img){
  document.getElementById("modal").style.display="block";
  document.getElementById("modalImg").src=img;
}

function closeModal(e){
  if(e.target.id==="modal" || e.target.className==="close"){
    document.getElementById("modal").style.display="none";
  }
}
</script>

</body>
</html>
