<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intermont</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; transition:0.3s; }

/* DARK MODE */
.dark {
  background:#0b0f14;
  color:white;
}
.dark header { background:#111; }
.dark .card { background:#1a1a1a; color:white; }

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:white;
}

.logo {
  font-size:22px;
  font-weight:bold;
}
.logo span { color:#0a84ff; }

.menu-toggle {
  font-size:26px;
  cursor:pointer;
  display:none;
}

nav {
  display:flex;
  gap:20px;
}
nav a {
  text-decoration:none;
  color:#333;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
  nav {
    position:absolute;
    top:60px;
    left:0;
    width:100%;
    background:white;
    flex-direction:column;
    display:none;
  }
  nav.active { display:flex; }
  .menu-toggle { display:block; }
}

/* HERO */
.hero {
  position:relative;
  height:400px;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.hero-content {
  position:absolute;
  top:50%;
  left:10%;
  transform:translateY(-50%);
  color:white;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:10px 18px;
  margin-top:10px;
  border-radius:6px;
  text-decoration:none;
  color:white;
}
.call { background:#0a84ff; }
.whatsapp { background:#25D366; }

/* CARDS */
.section { padding:40px 20px; }

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}
.card:hover { transform:scale(1.03); }

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}

.modal-content {
  background:white;
  margin:10% auto;
  padding:20px;
  width:90%;
  max-width:600px;
}
.modal img {
  width:100%;
  margin-top:10px;
}

/* ANIMACIJA */
.fade {
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}
.fade.show {
  opacity:1;
  transform:translateY(0);
}

/* FLOAT BUTTONS */
.float {
  position:fixed;
  right:15px;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
  text-decoration:none;
}
.call-btn { bottom:80px; background:#0a84ff; }
.wa-btn { bottom:20px; background:#25D366; }

/* FOOTER */
footer {
  text-align:center;
  padding:15px;
  background:#0b0f14;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <div class="logo">⚡ INTER<span>MONT</span></div>

  <div>
    <button onclick="toggleDark()">🌙</button>
    <span class="menu-toggle" onclick="toggleMenu()">☰</span>
  </div>

  <nav id="menu">
    <a href="#">Početna</a>
    <a href="#usluge">Usluge</a>
    <a href="#kontakt">Kontakt</a>
    <a href="#lokacija">Lokacija</a>
    <a href="#radnici">Radnici</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <img src="https://images.unsplash.com/photo-1581092921461-eab62e97a780">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Elektro usluge</h1>
    <p>5 godina iskustva</p>
    <p><b>Direktor: Nikola Stošić</b></p>

    <a href="tel:+38664139333" class="btn call">Pozovi</a>
    <a href="https://wa.me/38664139333" class="btn whatsapp">WhatsApp</a>
  </div>
</div>

<!-- USLUGE -->
<section id="usluge" class="section fade">
<h2>Usluge</h2>

<div class="cards">

<div class="card" onclick="openModal('kuca')">
<img src="https://images.unsplash.com/photo-1581091215367-59ab6b3f6e0f">
<h3>Kućne instalacije</h3>
</div>

<div class="card" onclick="openModal('kvar')">
<img src="https://images.unsplash.com/photo-1603791440384-56cd371ee9a7">
<h3>Popravke kvarova</h3>
</div>

<div class="card" onclick="openModal('led')">
<img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231">
<h3>LED rasvjeta</h3>
</div>

</div>
</section>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- KONTAKT -->
<section id="kontakt" class="section fade">
<h2>Kontakt</h2>
<p>+386 64 139 333</p>
</section>

<section id="lokacija" class="section fade">
<h2>Lokacija</h2>
<iframe src="https://maps.google.com/maps?q=Ptuj&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="250"></iframe>
</section>

<section id="radnici" class="section fade">
<h2>Radnici</h2>
<p>Profesionalni tim električara</p>
</section>

<footer>
© 2026 Intermont
</footer>

<!-- FLOAT -->
<a href="tel:+38664139333" class="float call-btn">📞</a>
<a href="https://wa.me/38664139333" class="float wa-btn">💬</a>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function openModal(type){
  let content = "";

  if(type==="kuca"){
    content = `
    <h2>Kućne instalacije</h2>
    <img src="https://images.unsplash.com/photo-1581091215367-59ab6b3f6e0f">
    <img src="https://images.unsplash.com/photo-1621905252507-b35492cc74b4">
    `;
  }

  if(type==="kvar"){
    content = `
    <h2>Popravke kvarova</h2>
    <img src="https://images.unsplash.com/photo-1603791440384-56cd371ee9a7">
    `;
  }

  if(type==="led"){
    content = `
    <h2>LED rasvjeta</h2>
    <img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231">
    `;
  }

  document.getElementById("modalContent").innerHTML = content;
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ANIMACIJA */
let faders = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
  faders.forEach(el => {
    let top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>
