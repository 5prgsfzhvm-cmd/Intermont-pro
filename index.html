<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intermont</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#f4f6f8;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.7);
  z-index:1000;
}

.logo{
  font-weight:600;
  font-size:22px;
}
.logo span{color:#0a84ff;}

nav{
  display:flex;
  gap:25px;
}
nav a{
  text-decoration:none;
  color:#333;
  font-weight:500;
  position:relative;
}
nav a::after{
  content:"";
  position:absolute;
  width:0;
  height:2px;
  background:#0a84ff;
  left:0;
  bottom:-4px;
  transition:0.3s;
}
nav a:hover::after{width:100%;}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding-left:10%;
  color:white;
  background:
  linear-gradient(120deg, rgba(10,132,255,0.7), rgba(0,0,0,0.5)),
  url("https://picsum.photos/1600/900?random=30");
  background-size:cover;
}

.hero h1{
  font-size:48px;
  margin-bottom:15px;
}

.btn{
  padding:12px 22px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  font-weight:600;
  margin-right:10px;
  display:inline-block;
  margin-top:15px;
  transition:0.3s;
}
.call{background:#0a84ff;}
.call:hover{transform:scale(1.05);}

.whatsapp{background:#25D366;}
.whatsapp:hover{transform:scale(1.05);}

/* SECTION */
.section{
  padding:80px 20px;
  max-width:1200px;
  margin:auto;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  transition:0.4s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 30px 60px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#0b0f14;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <div class="logo">⚡ INTER<span>MONT</span></div>
  <nav>
    <a href="#">Početna</a>
    <a href="#usluge">Usluge</a>
    <a href="#kontakt">Kontakt</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>⚡ Profesionalne elektro usluge</h1>
<p>Brzina • Kvalitet • Pouzdanost</p>

<a href="tel:+38664139333" class="btn call">📞 Pozovi</a>
<a href="https://wa.me/38664139333" class="btn whatsapp">💬 WhatsApp</a>
</div>
</section>

<!-- USLUGE -->
<section id="usluge" class="section fade">
<h2>Usluge</h2>

<div class="cards">

<div class="card">
<img src="https://picsum.photos/400/300?random=31">
<h3>Kućne instalacije</h3>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?random=32">
<h3>Popravke kvarova</h3>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?random=33">
<h3>LED rasvjeta</h3>
</div>

</div>
</section>

<section id="kontakt" class="section fade">
<h2>Kontakt</h2>
<p>📞 +386 64 139 333</p>
</section>

<footer>© 2026 Intermont</footer>

<script>
/* SCROLL ANIMATION */
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', ()=>{
  faders.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
